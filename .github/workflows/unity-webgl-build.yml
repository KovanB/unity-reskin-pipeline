name: Build Unity WebGL

on:
  workflow_dispatch:
  push:
    paths:
      - 'templates/unity-scripts/**'
      - '.github/trigger-build'

jobs:
  build:
    name: Build Trash Dash WebGL
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout reskin pipeline
        uses: actions/checkout@v4

      - name: Clone Trash Dash
        run: |
          git clone --depth 1 https://github.com/Unity-Technologies/EndlessRunnerSampleGame.git /tmp/trash-dash

      - name: Copy reskin scripts into project and commit
        run: |
          cp templates/unity-scripts/TextureSwapper.cs /tmp/trash-dash/Assets/Scripts/
          cp templates/unity-scripts/SkinLoader.cs /tmp/trash-dash/Assets/Scripts/
          cp templates/unity-scripts/GamePauser.cs /tmp/trash-dash/Assets/Scripts/
          mkdir -p /tmp/trash-dash/Assets/Plugins/WebGL/
          cp templates/unity-scripts/Plugins/WebGL/WebGLBridge.jslib /tmp/trash-dash/Assets/Plugins/WebGL/
          cd /tmp/trash-dash
          git config user.name "CI"
          git config user.email "ci@build"
          git add -A
          git commit -m "Add reskin scripts" --allow-empty

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: /tmp/trash-dash/Library
          key: unity-library-webgl-${{ hashFiles('/tmp/trash-dash/Assets/**') }}
          restore-keys: unity-library-webgl-

      - name: Verify secrets exist
        run: |
          echo "UNITY_LICENSE length: ${#UNITY_LICENSE}"
          echo "UNITY_EMAIL length: ${#UNITY_EMAIL}"
          echo "UNITY_PASSWORD length: ${#UNITY_PASSWORD}"
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Create custom build script
        run: |
          mkdir -p /tmp/trash-dash/Assets/Editor
          cat > /tmp/trash-dash/Assets/Editor/WebGLBuilder.cs << 'CSHARP'
          using UnityEditor;
          using System.Linq;
          public class WebGLBuilder
          {
              public static void Build()
              {
                  string[] scenes = EditorBuildSettings.scenes
                      .Where(s => s.enabled)
                      .Select(s => s.path)
                      .ToArray();
                  if (scenes.Length == 0)
                      scenes = new[] { "Assets/Scenes/Start.unity", "Assets/Scenes/Main.unity", "Assets/Scenes/Shop.unity" };
                  BuildPipeline.BuildPlayer(scenes, "build/TrashDash", BuildTarget.WebGL, BuildOptions.None);
              }
          }
          CSHARP

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: /tmp/trash-dash
          targetPlatform: WebGL
          unityVersion: 2021.3.6f1
          buildName: TrashDash
          buildsPath: /tmp/builds
          versioning: None
          allowDirtyBuild: true
          buildMethod: WebGLBuilder.Build

      - name: Prepare build output
        run: |
          BUILD_DIR="/tmp/builds/WebGL/TrashDash"
          echo "Build contents:"
          find "$BUILD_DIR" -type f | head -20
          ls -lah "$BUILD_DIR/Build/" || true
          cp templates/unity-webgl/index.html "$BUILD_DIR/index.html"

      - name: Upload WebGL build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webgl-build
          path: /tmp/builds/WebGL/TrashDash/
          retention-days: 90

      - name: Push build to webgl-build branch
        run: |
          cd /tmp/builds/WebGL/TrashDash
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -b webgl-build
          git add -A
          git commit -m "WebGL build $(date -u +%Y%m%d-%H%M%S)"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin webgl-build
