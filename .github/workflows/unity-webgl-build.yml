name: Build Unity WebGL

on:
  workflow_dispatch:
  push:
    paths:
      - 'templates/unity-scripts/**'
      - '.github/trigger-build'

jobs:
  build:
    name: Build Trash Dash WebGL
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout reskin pipeline
        uses: actions/checkout@v4
        with:
          path: reskin

      - name: Clone Trash Dash into workspace
        run: |
          git clone --depth 1 https://github.com/Unity-Technologies/EndlessRunnerSampleGame.git $GITHUB_WORKSPACE/trash-dash

      - name: Copy reskin scripts into project
        run: |
          cp reskin/templates/unity-scripts/TextureSwapper.cs trash-dash/Assets/Scripts/
          cp reskin/templates/unity-scripts/SkinLoader.cs trash-dash/Assets/Scripts/
          cp reskin/templates/unity-scripts/GamePauser.cs trash-dash/Assets/Scripts/
          mkdir -p trash-dash/Assets/Plugins/WebGL/
          cp reskin/templates/unity-scripts/Plugins/WebGL/WebGLBridge.jslib trash-dash/Assets/Plugins/WebGL/

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: trash-dash/Library
          key: unity-library-webgl-v1
          restore-keys: unity-library-webgl-

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: trash-dash
          targetPlatform: WebGL
          unityVersion: 2021.3.6f1
          buildName: TrashDash
          buildsPath: builds
          versioning: None
          allowDirtyBuild: true

      - name: List build output
        run: |
          echo "=== Build output ==="
          find builds/ -type f | head -30
          ls -lah builds/WebGL/TrashDash/Build/ 2>/dev/null || ls -lah builds/WebGL/ 2>/dev/null || ls -lah builds/ 2>/dev/null

      - name: Inject postMessage bridge into index.html
        run: |
          BUILD_DIR="builds/WebGL/TrashDash"
          # Add postMessage bridge script to Unity's generated index.html
          # This injects a listener right before </body>
          BRIDGE_SCRIPT='<script>
          /* postMessage bridge: React parent <-> Unity */
          var _unityInstance = null;
          /* Override createUnityInstance to capture the instance */
          var _origCreate = window.createUnityInstance;
          if (typeof createUnityInstance !== "undefined") {
            var _origFn = createUnityInstance;
            createUnityInstance = function(canvas, config, onProgress) {
              return _origFn(canvas, config, onProgress).then(function(instance) {
                _unityInstance = instance;
                window.parent.postMessage({source:"unity-loader",payload:{type:"loaded"}},"*");
                return instance;
              });
            };
          }
          window.addEventListener("message", function(e) {
            if (!e.data || e.data.source !== "react" || !_unityInstance) return;
            var p = e.data.payload;
            if (p.gameObject && p.method) _unityInstance.SendMessage(p.gameObject, p.method, p.data || "");
          });
          </script>'
          # Inject before </body>
          sed -i "s|</body>|${BRIDGE_SCRIPT}</body>|" "$BUILD_DIR/index.html"
          echo "Bridge injected into index.html"

      - name: Upload WebGL build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webgl-build
          path: builds/WebGL/TrashDash/
          retention-days: 90

      - name: Push build to webgl-build branch
        run: |
          cd builds/WebGL/TrashDash
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -b webgl-build
          git add -A
          git commit -m "WebGL build $(date -u +%Y%m%d-%H%M%S)"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin webgl-build
